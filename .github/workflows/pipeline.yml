name: Data Pipeline — Daily Scrape & Promote

on:
  schedule:
    # Daily at 02:00 UTC (off-peak window 18:00-06:00 UTC)
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      portal:
        description: "Portal to scrape (psrera or gmada)"
        default: "psrera"
        required: false
      limit:
        description: "Max records to promote"
        default: "2000"
        required: false

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.0"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @tricity/core build

      - name: Build pipeline
        run: pnpm --filter @tricity/pipeline build

      - name: Scrape PSRERA projects
        id: scrape
        working-directory: packages/pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dist/cli.js scrape --portal=${{ github.event.inputs.portal || 'psrera' }} --source=pdf --limit=2000

      - name: Stage prices from data file
        id: stage-prices
        working-directory: packages/pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dist/cli.js stage-prices

      - name: Promote records to production
        id: promote
        working-directory: packages/pipeline
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dist/cli.js promote --limit=${{ github.event.inputs.limit || '2000' }}

      - name: Revalidate site cache
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
        run: |
          if [ -n "$SITE_URL" ] && [ -n "$REVALIDATION_SECRET" ]; then
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$SITE_URL/api/revalidate" \
              -H "Content-Type: application/json" \
              -d "{\"secret\":\"$REVALIDATION_SECRET\"}" || true)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Revalidation triggered"
            else
              echo "Revalidation returned HTTP $HTTP_CODE — site may not be deployed yet"
            fi
          else
            echo "SITE_URL or REVALIDATION_SECRET not set — skipping revalidation"
          fi
