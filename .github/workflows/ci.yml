name: CI — Build & Test

on:
  push:
    branches: [master, main]
    paths:
      - "tricity-re/**"
  pull_request:
    branches: [master, main]
    paths:
      - "tricity-re/**"

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: tricity-re/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: tricity-re
        run: pnpm install --frozen-lockfile

      - name: Build packages
        working-directory: tricity-re
        run: |
          pnpm --filter @tricity/core build
          pnpm --filter @tricity/pipeline build

      - name: Run tests
        working-directory: tricity-re
        run: |
          pnpm --filter @tricity/core test
          pnpm --filter @tricity/pipeline test
          pnpm --filter @tricity/web test

      - name: Build web app
        working-directory: tricity-re
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder"
        run: pnpm --filter @tricity/web build

      - name: Verify sitemap and robots
        working-directory: tricity-re
        run: |
          test -f apps/web/.next/server/app/sitemap.xml.meta && echo "✅ sitemap.xml generated" || echo "⚠️ sitemap.xml missing"
          test -f apps/web/.next/server/app/robots.txt.meta && echo "✅ robots.txt generated" || echo "⚠️ robots.txt missing"
